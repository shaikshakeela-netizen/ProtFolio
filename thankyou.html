<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <link rel="stylesheet" href="style.css"> <!-- Link to your main CSS -->
  <style>
    body {
      background-color: var(--primary-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }
    h1 {
      color: var(--accent1);
      margin-bottom: 10px;
      font-size: 2.5rem;
      animation: fadeIn 1s ease-in-out;
      z-index: 1;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.2rem;
      margin-bottom: 20px;
      z-index: 1;
    }
    a {
      background: var(--accent1);
      color: #000;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      z-index: 1;
    }
    a:hover {
      background: var(--accent2);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>

  <h1>Thank You!</h1>
  <p>Your message has been sent successfully. I’ll get back to you soon.</p>
  <a href="index.html">Back to Home</a>

  <script>
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#00BFA6', '#FFB400', '#EAEAEA', '#B0B0B0'];
    let confetti = [];

    function createConfettiBurstPiece() {
      const angle = Math.random() * 2 * Math.PI;
      const speed = Math.random() * 6 + 4;
      return {
        x: canvas.width / 2,
        y: canvas.height / 2,
        width: Math.random() * 8 + 4,
        height: Math.random() * 14 + 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedX: Math.cos(angle) * speed,
        speedY: Math.sin(angle) * speed,
        rotation: Math.random() * 360,
        rotationSpeed: Math.random() * 6 - 3,
        mode: 'burst',
        life: 60 // frames before falling
      };
    }

    function createFallingConfetti() {
      return {
        x: Math.random() * canvas.width,
        y: -20,
        width: Math.random() * 8 + 4,
        height: Math.random() * 14 + 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: Math.random() * 3 + 2,
        rotation: Math.random() * 360,
        rotationSpeed: Math.random() * 6 - 3,
        mode: 'fall'
      };
    }

    function drawConfettiPiece(c) {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rotation * Math.PI / 180);
      ctx.fillStyle = c.color;
      ctx.fillRect(-c.width / 2, -c.height / 2, c.width, c.height);
      ctx.restore();
    }

    function updateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach((c, i) => {
        if (c.mode === 'burst') {
          c.x += c.speedX;
          c.y += c.speedY;
          c.rotation += c.rotationSpeed;
          c.life--;
          if (c.life <= 0) {
            // switch to falling
            confetti[i] = createFallingConfetti();
            confetti[i].x = c.x;
            confetti[i].y = c.y;
          }
        } else {
          c.y += c.speedY;
          c.rotation += c.rotationSpeed;
          if (c.y > canvas.height) {
            confetti[i] = createFallingConfetti();
          }
        }
        drawConfettiPiece(c);
      });
      requestAnimationFrame(updateConfetti);
    }

    // Initial burst
    for (let i = 0; i < 150; i++) {
      confetti.push(createConfettiBurstPiece());
    }

    updateConfetti();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
